apiVersion: apps/v1
kind: Deployment
metadata:
  name: nextcloud
  namespace: nextcloud
  labels:
    app: nextcloud
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nextcloud
  template:
    metadata:
      labels:
        app: nextcloud
    spec:
      # This ensures Nextcloud only runs on your storage node T3500
      nodeSelector:
        kubernetes.io/hostname: storagenodet3500
      initContainers:
        - name: prep-data-dir
          image: alpine:3.19
          command:
            - sh
            - -c
            - |
              mkdir -p /var/www/html/config /var/www/html/data /var/www/html/apps /var/www/html/custom_apps
              chown -R 33:33 /var/www/html
              [ ! -f /var/www/html/data/.ocdata ] && touch /var/www/html/data/.ocdata || true
          volumeMounts:
            - name: nextcloud-html
              mountPath: /var/www/html
      containers:
        - name: nextcloud
          image: nextcloud:29-apache
          ports:
            - containerPort: 80
              name: http
          env:
            - name: MYSQL_HOST
              value: "mariadb.nextcloud.svc.cluster.local"
            - name: MYSQL_DATABASE
              valueFrom:
                secretKeyRef:
                  name: nextcloud-secrets
                  key: db-name
            - name: MYSQL_USER
              valueFrom:
                secretKeyRef:
                  name: nextcloud-secrets
                  key: db-user
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: nextcloud-secrets
                  key: db-password
            - name: NEXTCLOUD_ADMIN_USER
              valueFrom:
                secretKeyRef:
                  name: nextcloud-secrets
                  key: admin-user
            - name: NEXTCLOUD_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: nextcloud-secrets
                  key: admin-password
            - name: NEXTCLOUD_TRUSTED_DOMAINS
              valueFrom:
                secretKeyRef:
                  name: nextcloud-secrets
                  key: trusted-domains
            # Proxy/SSL Overwrite settings
            - name: OVERWRITEPROTOCOL
              value: "https"
            - name: OVERWRITEHOST
              valueFrom:
                secretKeyRef:
                  name: nextcloud-secrets
                  key: overwritehost
          volumeMounts:
            - name: nextcloud-html
              mountPath: /var/www/html
            - name: family-files
              mountPath: /var/www/html/data
          resources:
            limits:
              cpu: "2"
              memory: 1536Mi
            requests:
              cpu: "250m"
              memory: 512Mi
      volumes:
        - name: nextcloud-html
          hostPath:
            # System files (Code, Config, Apps)
            path: /srv/media/nextcloud/html
            type: DirectoryOrCreate
        - name: family-files
          hostPath:
            # Actual User Data (The stuff you want to keep safe)
            path: /srv/media/nextcloud/data
            type: DirectoryOrCreate
---
apiVersion: v1
kind: Service
metadata:
  name: nextcloud
  namespace: nextcloud
spec:
  selector:
    app: nextcloud
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
  type: ClusterIP